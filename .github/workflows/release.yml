name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      id-token: write # PyPI trusted publishing (OIDC, no API token)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      # Requires a PyPI trusted publisher for this project:
      # PyPI project -> Settings -> Publishing -> add GitHub Actions,
      # owner CameronBrooks11, repo pyzot, workflow release.yml.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
